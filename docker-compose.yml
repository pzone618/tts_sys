version: '3.8'

services:
  tts-api:
    build: .
    container_name: tts-system-api
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DATABASE_URL=sqlite:///./database/tts_sys.db
      - STORAGE_PATH=/app/storage
      - CACHE_ENABLED=true
      - LOG_LEVEL=INFO
      # Add your API keys here or use .env file
      - EDGE_TTS_ENABLED=true
      - YOUDAO_TTS_ENABLED=false
      - OPENAI_TTS_ENABLED=false
    volumes:
      - ./storage:/app/storage
      - ./database:/app/database
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:$${API_PORT:-8000}/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Add nginx as reverse proxy
